<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="c3-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
    <linearGradient id="c3-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <!-- Soft rounded square — approachable base -->
  <rect x="56" y="56" width="400" height="400" rx="100" fill="url(#c3-grad)"/>
  <!-- Central core circle -->
  <circle cx="256" cy="256" r="80" fill="url(#c3-core)"/>
  <!-- Three orbital nodes — representing connected modules/sites -->
  <circle cx="256" cy="128" r="24" fill="#FAF9F7"/>
  <circle cx="368" cy="320" r="24" fill="#FAF9F7"/>
  <circle cx="144" cy="320" r="24" fill="#FAF9F7"/>
  <!-- Connecting lines — subtle, geometric -->
  <line x1="256" y1="208" x2="256" y2="152" stroke="#FAF9F7" stroke-width="4" opacity="0.3"/>
  <line x1="304" y1="280" x2="350" y2="308" stroke="#FAF9F7" stroke-width="4" opacity="0.3"/>
  <line x1="208" y1="280" x2="162" y2="308" stroke="#FAF9F7" stroke-width="4" opacity="0.3"/>
</svg>