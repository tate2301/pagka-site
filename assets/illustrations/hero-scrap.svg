<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Scrap piles (left) -->
  <rect x="60" y="180" width="70" height="50" rx="10" fill="white" stroke="#1A1A1A" stroke-width="1" transform="rotate(-8 95 205)"/>
  <rect x="90" y="160" width="60" height="45" rx="10" fill="white" stroke="#1A1A1A" stroke-width="1" transform="rotate(5 120 182)"/>
  <rect x="70" y="140" width="55" height="40" rx="10" fill="white" stroke="#1A1A1A" stroke-width="1" transform="rotate(-3 97 160)"/>
  <rect x="110" y="150" width="50" height="38" rx="10" fill="white" stroke="#1A1A1A" stroke-width="1" transform="rotate(12 135 169)"/>
  
  <!-- Scrap details -->
  <rect x="80" y="190" width="30" height="3" rx="1.5" fill="#737373" transform="rotate(-8 95 205)"/>
  <rect x="105" y="172" width="25" height="3" rx="1.5" fill="#737373"/>
  <rect x="85" y="155" width="20" height="3" rx="1.5" fill="#737373"/>

  <!-- Weighing station (center) -->
  <rect x="200" y="160" width="100" height="100" rx="12" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Scale base -->
  <rect x="220" y="220" width="60" height="8" rx="4" fill="#1A1A1A"/>
  <!-- Scale platform -->
  <rect x="215" y="200" width="70" height="12" rx="6" fill="#F5F3EF" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Weight display -->
  <rect x="235" y="175" width="30" height="18" rx="6" fill="#1A1A1A"/>
  <rect x="242" y="182" width="16" height="4" rx="2" fill="white"/>

  <!-- Sorted grid (right) -->
  <rect x="340" y="140" width="120" height="160" rx="12" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Grid cells -->
  <rect x="355" y="155" width="30" height="25" rx="6" fill="#F27B6A" opacity="0.2"/>
  <rect x="390" y="155" width="30" height="25" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="425" y="155" width="25" height="25" rx="6" fill="#7C5CFC" opacity="0.15"/>
  
  <rect x="355" y="187" width="30" height="25" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="390" y="187" width="30" height="25" rx="6" fill="#F27B6A" opacity="0.3"/>
  <rect x="425" y="187" width="25" height="25" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  
  <rect x="355" y="219" width="30" height="25" rx="6" fill="#7C5CFC" opacity="0.2"/>
  <rect x="390" y="219" width="30" height="25" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="425" y="219" width="25" height="25" rx="6" fill="#F27B6A" opacity="0.15"/>
  
  <rect x="355" y="251" width="30" height="25" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="390" y="251" width="30" height="25" rx="6" fill="#7C5CFC" opacity="0.25"/>
  <rect x="425" y="251" width="25" height="25" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Sorted markers -->
  <circle cx="370" cy="167" r="4" fill="#F27B6A"/>
  <circle cx="437" cy="167" r="4" fill="#7C5CFC"/>
  <circle cx="405" cy="199" r="4" fill="#F27B6A"/>
  <circle cx="370" cy="231" r="4" fill="#7C5CFC"/>
  <circle cx="437" cy="263" r="4" fill="#7C5CFC"/>

  <!-- Connecting arc -->
  <path d="M 160 210 Q 180 210 200 210" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
  <path d="M 300 210 Q 320 210 340 210" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 4" fill="none"/>

  <!-- Arrow from scrap to scale -->
  <path d="M 155 200 L 190 200" stroke="#F27B6A" stroke-width="1.5" stroke-dasharray="3 3"/>
  <path d="M 185 196 L 193 200 L 185 204" stroke="#F27B6A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Arrow from scale to grid -->
  <path d="M 305 200 L 330 200" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="3 3"/>
  <path d="M 325 196 L 333 200 L 325 204" stroke="#7C5CFC" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Labels -->
  <rect x="75" y="260" width="70" height="20" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="85" y="268" width="50" height="3" rx="1.5" fill="#737373"/>

  <rect x="220" y="280" width="70" height="20" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="230" y="288" width="50" height="3" rx="1.5" fill="#737373"/>

  <rect x="365" y="320" width="70" height="20" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="375" y="328" width="50" height="3" rx="1.5" fill="#737373"/>

  <!-- Floating elements -->
  <circle cx="100" cy="100" r="8" fill="#F27B6A" opacity="0.15"/>
  <circle cx="400" cy="110" r="10" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="300" cy="340" r="8" fill="#F27B6A" opacity="0.2"/>
  <circle cx="180" cy="350" r="6" fill="#7C5CFC" opacity="0.15"/>
</svg>
