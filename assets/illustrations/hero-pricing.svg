<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Card 1 (Starter - behind left) -->
  <rect x="40" y="100" width="140" height="200" rx="12" fill="white" stroke="#1A1A1A" stroke-width="1.5" transform="rotate(-8 110 200)"/>
  <rect x="60" y="120" width="80" height="6" rx="3" fill="#1A1A1A" transform="rotate(-8 110 200)"/>
  <rect x="60" y="140" width="60" height="4" rx="2" fill="#737373" transform="rotate(-8 110 200)"/>
  <rect x="60" y="160" width="70" height="4" rx="2" fill="#737373" transform="rotate(-8 110 200)"/>
  <rect x="60" y="180" width="55" height="4" rx="2" fill="#737373" transform="rotate(-8 110 200)"/>
  <rect x="60" y="210" width="50" height="8" rx="4" fill="#1A1A1A" opacity="0.1" transform="rotate(-8 110 200)"/>
  <rect x="55" y="250" width="90" height="28" rx="6" fill="#F5F3EF" transform="rotate(-8 110 200)"/>
  <rect x="70" y="260" width="50" height="4" rx="2" fill="#1A1A1A" transform="rotate(-8 110 200)"/>

  <!-- Card 2 (Growth - front center, highlighted) -->
  <rect x="130" y="80" width="150" height="220" rx="12" fill="white" stroke="#F27B6A" stroke-width="2"/>
  <rect x="155" y="105" width="90" height="8" rx="4" fill="#1A1A1A"/>
  <rect x="155" y="130" width="70" height="5" rx="2.5" fill="#737373"/>
  <rect x="155" y="150" width="80" height="5" rx="2.5" fill="#737373"/>
  <rect x="155" y="170" width="65" height="5" rx="2.5" fill="#737373"/>
  <rect x="155" y="190" width="75" height="5" rx="2.5" fill="#737373"/>
  <rect x="155" y="210" width="55" height="5" rx="2.5" fill="#737373"/>
  <rect x="155" y="240" width="60" height="10" rx="5" fill="#F27B6A" opacity="0.15"/>
  <rect x="145" y="270" width="100" height="32" rx="8" fill="#F27B6A"/>
  <rect x="170" y="282" width="50" height="5" rx="2.5" fill="white"/>

  <!-- Most Popular tag -->
  <rect x="180" y="60" width="80" height="24" rx="12" fill="#F27B6A"/>
  <rect x="200" y="70" width="40" height="4" rx="2" fill="white"/>

  <!-- Card 3 (Business - behind right) -->
  <rect x="240" y="110" width="130" height="190" rx="12" fill="white" stroke="#7C5CFC" stroke-width="1.5" transform="rotate(6 305 205)"/>
  <rect x="260" y="130" width="70" height="6" rx="3" fill="#1A1A1A" transform="rotate(6 305 205)"/>
  <rect x="260" y="150" width="55" height="4" rx="2" fill="#737373" transform="rotate(6 305 205)"/>
  <rect x="260" y="170" width="65" height="4" rx="2" fill="#737373" transform="rotate(6 305 205)"/>
  <rect x="260" y="190" width="50" height="4" rx="2" fill="#737373" transform="rotate(6 305 205)"/>
  <rect x="260" y="220" width="45" height="8" rx="4" fill="#7C5CFC" opacity="0.15" transform="rotate(6 305 205)"/>
  <rect x="255" y="260" width="80" height="26" rx="6" fill="#F5F3EF" transform="rotate(6 305 205)"/>
  <rect x="270" y="270" width="45" height="4" rx="2" fill="#1A1A1A" transform="rotate(6 305 205)"/>

  <!-- Connecting line to CTA -->
  <path d="M 205 340 L 205 380" stroke="#F27B6A" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="205" cy="390" r="8" fill="#F27B6A" opacity="0.2"/>
  <circle cx="205" cy="390" r="4" fill="#F27B6A"/>

  <!-- Feature dots floating -->
  <circle cx="80" cy="340" r="5" fill="#F27B6A" opacity="0.2"/>
  <circle cx="110" cy="360" r="4" fill="#7C5CFC" opacity="0.15"/>
  <circle cx="330" cy="350" r="5" fill="#F27B6A" opacity="0.2"/>
  <circle cx="360" cy="330" r="4" fill="#7C5CFC" opacity="0.15"/>

  <!-- Floating elements -->
  <circle cx="60" cy="60" r="8" fill="#F27B6A" opacity="0.15"/>
  <circle cx="350" cy="70" r="10" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="380" cy="280" r="8" fill="#F27B6A" opacity="0.2"/>
