<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" preserveAspectRatio="xMidYMid slice" fill="none">
  <!-- Concentric circles -->
  <circle cx="600" cy="175" r="200" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="600" cy="175" r="400" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="600" cy="175" r="600" stroke="white" stroke-width="1" opacity="0.03"/>

  <!-- Orbiting nodes -->
  <circle cx="450" cy="80" r="12" fill="#F27B6A" opacity="0.1"/>
  <circle cx="450" cy="80" r="6" fill="#F27B6A" opacity="0.15"/>
  <path d="M 450 92 Q 480 120 520 130" stroke="#F27B6A" stroke-width="1" opacity="0.1" fill="none"/>

  <circle cx="800" cy="120" r="10" fill="#F27B6A" opacity="0.08"/>
  <circle cx="800" cy="120" r="5" fill="#F27B6A" opacity="0.12"/>
  <path d="M 800 130 Q 750 160 720 165" stroke="#F27B6A" stroke-width="1" opacity="0.08" fill="none"/>

  <circle cx="750" cy="280" r="14" fill="#F27B6A" opacity="0.1"/>
  <circle cx="750" cy="280" r="7" fill="#F27B6A" opacity="0.15"/>
  <path d="M 750 266 Q 700 240 650 235" stroke="#F27B6A" stroke-width="1" opacity="0.1" fill="none"/>

  <circle cx="350" cy="200" r="10" fill="#7C5CFC" opacity="0.08"/>
  <circle cx="350" cy="200" r="5" fill="#7C5CFC" opacity="0.1"/>
  <path d="M 350 190 Q 380 170 420 165" stroke="#7C5CFC" stroke-width="1" opacity="0.08" fill="none"/>

  <circle cx="900" cy="250" r="8" fill="#7C5CFC" opacity="0.06"/>
  <circle cx="900" cy="250" r="4" fill="#7C5CFC" opacity="0.1"/>
  <path d="M 900 242 Q 850 220 820 215" stroke="#7C5CFC" stroke-width="1" opacity="0.06" fill="none"/>

  <!-- Larger coral circles -->
  <circle cx="200" cy="100" r="30" fill="#F27B6A" opacity="0.06"/>
  <circle cx="1000" cy="80" r="25" fill="#F27B6A" opacity="0.05"/>
  <circle cx="150" cy="280" r="20" fill="#7C5CFC" opacity="0.04"/>
  <circle cx="1050" cy="300" r="35" fill="#F27B6A" opacity="0.04"/>

  <!-- Radial gradient overlay -->
  <defs>
    <radialGradient id="orbit-fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="350" fill="url(#orbit-fade)"/>
</svg>