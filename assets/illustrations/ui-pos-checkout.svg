<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" fill="none">
  <!-- POS Screen -->
  <rect x="180" y="30" width="340" height="390" rx="16" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="2"/>
  <rect x="190" y="42" width="320" height="366" rx="12" fill="white"/>
  
  <!-- Header -->
  <rect x="190" y="42" width="320" height="50" rx="12" fill="white"/>
  <rect x="210" y="58" width="80" height="6" rx="3" fill="#F27B6A"/>
  <rect x="210" y="70" width="50" height="3" rx="1.5" fill="#737373"/>
  <rect x="470" y="58" width="24" height="24" rx="6" fill="#F5F3EF"/>
  <circle cx="482" cy="70" r="5" fill="#1A1A1A" opacity="0.3"/>

  <!-- Cart items -->
  <rect x="210" y="105" width="280" height="50" rx="8" fill="#F5F3EF"/>
  <rect x="225" y="115" width="30" height="30" rx="6" fill="#F27B6A" opacity="0.2"/>
  <circle cx="240" cy="130" r="8" fill="#F27B6A" opacity="0.4"/>
  <rect x="270" y="118" width="120" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="270" y="130" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="450" y="118" width="30" height="5" rx="2.5" fill="#1A1A1A"/>

  <rect x="210" y="165" width="280" height="50" rx="8" fill="#F5F3EF"/>
  <rect x="225" y="175" width="30" height="30" rx="6" fill="#7C5CFC" opacity="0.2"/>
  <circle cx="240" cy="190" r="8" fill="#7C5CFC" opacity="0.4"/>
  <rect x="270" y="178" width="120" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="270" y="190" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="450" y="178" width="30" height="5" rx="2.5" fill="#1A1A1A"/>

  <rect x="210" y="225" width="280" height="50" rx="8" fill="#F5F3EF"/>
  <rect x="225" y="235" width="30" height="30" rx="6" fill="#1A1A1A" opacity="0.1"/>
  <circle cx="240" cy="250" r="8" fill="#1A1A1A" opacity="0.2"/>
  <rect x="270" y="238" width="120" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="270" y="250" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="450" y="238" width="30" height="5" rx="2.5" fill="#1A1A1A"/>

  <!-- Total bar -->
  <rect x="210" y="295" width="280" height="60" rx="10" fill="#F27B6A" opacity="0.1"/>
  <rect x="225" y="310" width="50" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="225" y="322" width="30" height="3" rx="1.5" fill="#737373"/>
  <rect x="420" y="310" width="50" height="5" rx="2.5" fill="#F27B6A"/>
  <rect x="420" y="322" width="40" height="3" rx="1.5" fill="#F27B6A" opacity="0.7"/>

  <!-- Pay button -->
  <rect x="210" y="370" width="280" height="28" rx="8" fill="#F27B6A"/>
  <rect x="320" y="381" width="60" height="4" rx="2" fill="white"/>

  <!-- Connected printer (right side) -->
  <rect x="560" y="200" width="80" height="60" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="570" y="210" width="40" height="4" rx="2" fill="#1A1A1A"/>
  <rect x="570" y="222" width="30" height="20" rx="4" fill="#F5F3EF"/>
  <rect x="575" y="228" width="20" height="3" rx="1.5" fill="#737373"/>
  <rect x="575" y="235" width="15" height="3" rx="1.5" fill="#737373"/>
  <circle cx="620" cy="225" r="6" fill="#F27B6A" opacity="0.3"/>
  <path d="M 530 230 L 555 230" stroke="#E5E5E5" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Phone (left side, same POS) -->
  <rect x="40" y="180" width="100" height="180" rx="12" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="2"/>
  <rect x="48" y="192" width="84" height="156" rx="8" fill="white"/>
  <!-- Mini cart on phone -->
  <rect x="58" y="204" width="64" height="24" rx="4" fill="#F5F3EF"/>
  <rect x="65" y="212" width="40" height="3" rx="1.5" fill="#1A1A1A"/>
  <rect x="58" y="240" width="64" height="24" rx="4" fill="#F5F3EF"/>
  <rect x="65" y="248" width="40" height="3" rx="1.5" fill="#1A1A1A"/>
  <rect x="58" y="276" width="64" height="24" rx="4" fill="#F5F3EF"/>
  <rect x="65" y="284" width="40" height="3" rx="1.5" fill="#1A1A1A"/>
  <rect x="58" y="312" width="64" height="28" rx="6" fill="#F27B6A"/>
  <rect x="72" y="322" width="36" height="3" rx="1.5" fill="white"/>
  <path d="M 148 270 L 175 270" stroke="#E5E5E5" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Decorative elements -->
  <circle cx="30" cy="100" r="8" fill="#F27B6A" opacity="0.15"/>
  <circle cx="660" cy="120" r="10" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="650" cy="320" r="8" fill="#F27B6A" opacity="0.2"/>
</svg>