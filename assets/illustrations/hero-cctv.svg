<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Central camera lens -->
  <circle cx="250" cy="200" r="80" fill="white" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="250" cy="200" r="55" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="250" cy="200" r="30" fill="none" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="250" cy="200" r="8" fill="#F27B6A"/>
  
  <!-- Crosshair -->
  <line x1="250" y1="130" x2="250" y2="170" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="250" y1="230" x2="250" y2="270" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="180" y1="200" x2="220" y2="200" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="280" y1="200" x2="320" y2="200" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Camera nodes at 12, 3, 6, 9 o'clock -->
  <!-- 12 o'clock -->
  <circle cx="250" cy="85" r="18" fill="#F27B6A" stroke="white" stroke-width="2"/>
  <circle cx="250" cy="85" r="6" fill="white"/>
  
  <!-- 3 o'clock -->
  <circle cx="365" cy="200" r="18" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="365" cy="200" r="6" fill="#1A1A1A" opacity="0.3"/>
  
  <!-- 6 o'clock -->
  <circle cx="250" cy="315" r="18" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="250" cy="315" r="6" fill="#1A1A1A" opacity="0.3"/>
  
  <!-- 9 o'clock -->
  <circle cx="135" cy="200" r="18" fill="#F27B6A" stroke="white" stroke-width="2"/>
  <circle cx="135" cy="200" r="6" fill="white"/>

  <!-- Scanning waves -->
  <path d="M 250 200 m -100 0 a 100 100 0 1 1 200 0" stroke="#F27B6A" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 250 200 m -65 0 a 65 65 0 1 1 130 0" stroke="#F27B6A" stroke-width="1" fill="none" opacity="0.2"/>
  
  <!-- Timeline at bottom -->
  <rect x="80" y="360" width="340" height="24" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="90" y="368" width="60" height="8" rx="4" fill="#F27B6A"/>
  <rect x="160" y="368" width="60" height="8" rx="4" fill="#7C5CFC" opacity="0.5"/>
  <rect x="230" y="368" width="60" height="8" rx="4" fill="#F27B6A" opacity="0.3"/>
  <rect x="300" y="368" width="60" height="8" rx="4" fill="#E5E5E5"/>
  <circle cx="120" cy="372" r="3" fill="white"/>
  <circle cx="190" cy="372" r="3" fill="white"/>

  <!-- Labels -->
  <rect x="225" y="50" width="50" height="16" rx="4" fill="#F27B6A" opacity="0.1"/>
  <rect x="235" y="56" width="30" height="4" rx="2" fill="#F27B6A"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="120" r="8" fill="#F27B6A" opacity="0.1"/>
  <circle cx="400" cy="280" r="10" fill="#7C5CFC" opacity="0.1"/>
</svg>
