<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" fill="none">
  <!-- Sidebar tabs -->
  <rect x="40" y="40" width="160" height="370" rx="12" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Active tab (highlighted) -->
  <rect x="55" y="70" width="130" height="40" rx="8" fill="#F5F3EF" stroke="none"/>
  <rect x="55" y="70" width="4" height="40" rx="2" fill="#F27B6A"/>
  <circle cx="75" cy="90" r="8" fill="#F27B6A" opacity="0.2"/>
  <rect x="90" y="85" width="70" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="90" y="96" width="50" height="3" rx="1.5" fill="#737373"/>

  <!-- Inactive tabs -->
  <rect x="65" y="125" width="110" height="35" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="80" cy="142" r="6" fill="#7C5CFC" opacity="0.2"/>
  <rect x="95" y="138" width="60" height="4" rx="2" fill="#737373"/>

  <rect x="65" y="175" width="110" height="35" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="80" cy="192" r="6" fill="#1A1A1A" opacity="0.1"/>
  <rect x="95" y="188" width="60" height="4" rx="2" fill="#737373"/>

  <rect x="65" y="225" width="110" height="35" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="80" cy="242" r="6" fill="#F27B6A" opacity="0.15"/>
  <rect x="95" y="238" width="60" height="4" rx="2" fill="#737373"/>

  <!-- Main content area -->
  <rect x="220" y="40" width="440" height="370" rx="12" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Module header -->
  <rect x="250" y="70" width="120" height="8" rx="4" fill="#1A1A1A"/>
  <rect x="520" y="68" width="80" height="12" rx="6" fill="#F27B6A" opacity="0.15"/>
  <rect x="528" y="72" width="45" height="4" rx="2" fill="#F27B6A"/>

  <!-- Content grid (representing active module) -->
  <!-- Row 1 -->
  <rect x="250" y="110" width="180" height="60" rx="8" fill="#F5F3EF"/>
  <rect x="265" y="125" width="80" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="265" y="140" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="265" y="152" width="40" height="3" rx="1.5" fill="#737373"/>
  <circle cx="400" cy="140" r="10" fill="#F27B6A" opacity="0.2"/>

  <!-- Row 2 -->
  <rect x="450" y="110" width="180" height="60" rx="8" fill="#F5F3EF"/>
  <rect x="465" y="125" width="80" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="465" y="140" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="465" y="152" width="50" height="3" rx="1.5" fill="#737373"/>
  <circle cx="600" cy="140" r="10" fill="#7C5CFC" opacity="0.2"/>

  <!-- Row 3 -->
  <rect x="250" y="190" width="180" height="60" rx="8" fill="#F5F3EF"/>
  <rect x="265" y="205" width="80" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="265" y="220" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="265" y="232" width="40" height="3" rx="1.5" fill="#F27B6A"/>
  <circle cx="400" cy="220" r="10" fill="#F27B6A" opacity="0.3"/>

  <!-- Row 4 -->
  <rect x="450" y="190" width="180" height="60" rx="8" fill="#F5F3EF"/>
  <rect x="465" y="205" width="80" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="465" y="220" width="60" height="3" rx="1.5" fill="#737373"/>
  <rect x="465" y="232" width="50" height="3" rx="1.5" fill="#737373"/>
  <circle cx="600" cy="220" r="10" fill="#1A1A1A" opacity="0.15"/>

  <!-- Bottom chart -->
  <rect x="250" y="280" width="380" height="100" rx="8" fill="#F5F3EF"/>
  <rect x="265" y="295" width="80" height="5" rx="2.5" fill="#1A1A1A"/>
  <rect x="265" y="310" width="60" height="3" rx="1.5" fill="#737373"/>
  <!-- Chart bars -->
  <rect x="270" y="340" width="20" height="25" rx="4" fill="#F27B6A" opacity="0.5"/>
  <rect x="300" y="330" width="20" height="35" rx="4" fill="#F27B6A" opacity="0.7"/>
  <rect x="330" y="320" width="20" height="45" rx="4" fill="#F27B6A"/>
  <rect x="360" y="335" width="20" height="30" rx="4" fill="#7C5CFC" opacity="0.5"/>
  <rect x="390" y="325" width="20" height="40" rx="4" fill="#F27B6A" opacity="0.6"/>
  <rect x="420" y="315" width="20" height="50" rx="4" fill="#F27B6A"/>
  <rect x="450" y="340" width="20" height="25" rx="4" fill="#7C5CFC" opacity="0.4"/>

  <!-- Subtle grid background -->
  <defs>
    <pattern id="product-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#E5E5E5" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
  </defs>
  <rect x="220" y="40" width="440" height="370" rx="12" fill="url(#product-grid)" opacity="0.5" pointer-events="none"/>

  <!-- Floating elements -->
  <circle cx="30" cy="100" r="8" fill="#F27B6A" opacity="0.15"/>
  <circle cx="680" cy="150" r="10" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="50" cy="350" r="8" fill="#F27B6A" opacity="0.2"/>
</svg>