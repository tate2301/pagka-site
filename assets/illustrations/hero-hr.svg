<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Person 1 -->
  <circle cx="150" cy="160" r="45" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="150" cy="135" r="18" fill="#F5F3EF" stroke="#1A1A1A" stroke-width="1"/>
  <rect x="135" y="155" width="30" height="6" rx="3" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="150" cy="108" r="12" fill="#F27B6A" opacity="0.15"/>

  <!-- Person 2 (center, manager) -->
  <circle cx="250" cy="140" r="55" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="250" cy="110" r="22" fill="#F5F3EF" stroke="#1A1A1A" stroke-width="1"/>
  <rect x="232" y="135" width="36" height="8" rx="4" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="250" cy="78" r="14" fill="#F27B6A" opacity="0.2"/>
  <circle cx="250" cy="78" r="6" fill="#F27B6A"/>

  <!-- Person 3 -->
  <circle cx="350" cy="160" r="45" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="350" cy="135" r="18" fill="#F5F3EF" stroke="#1A1A1A" stroke-width="1"/>
  <rect x="335" y="155" width="30" height="6" rx="3" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="350" cy="108" r="12" fill="#7C5CFC" opacity="0.15"/>

  <!-- Connecting lines (org chart) -->
  <line x1="195" y1="160" x2="200" y2="160" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="200" y1="160" x2="200" y2="140" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="200" y1="140" x2="195" y2="140" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/>
  
  <line x1="305" y1="140" x2="300" y2="140" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="300" y1="140" x2="300" y2="160" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="300" y1="160" x2="305" y2="160" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Payroll cards below -->
  <rect x="100" y="250" width="100" height="60" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="120" cy="270" r="8" fill="#F27B6A" opacity="0.2"/>
  <rect x="135" y="265" width="50" height="4" rx="2" fill="#1A1A1A"/>
  <rect x="135" y="275" width="40" height="3" rx="1.5" fill="#737373"/>
  <rect x="115" y="290" width="70" height="8" rx="4" fill="#F27B6A" opacity="0.15"/>

  <rect x="220" y="250" width="100" height="60" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="240" cy="270" r="8" fill="#7C5CFC" opacity="0.2"/>
  <rect x="255" y="265" width="50" height="4" rx="2" fill="#1A1A1A"/>
  <rect x="255" y="275" width="40" height="3" rx="1.5" fill="#737373"/>
  <rect x="235" y="290" width="70" height="8" rx="4" fill="#7C5CFC" opacity="0.15"/>

  <!-- Pie chart -->
  <circle cx="400" cy="280" r="35" fill="none" stroke="#E5E5E5" stroke-width="1"/>
  <path d="M 400 280 L 400 245 A 35 35 0 0 1 435 280 Z" fill="#F27B6A" opacity="0.8"/>
  <path d="M 400 280 L 435 280 A 35 35 0 0 1 400 315 Z" fill="#7C5CFC" opacity="0.5"/>
  <path d="M 400 280 L 400 315 A 35 35 0 0 1 365 280 Z" fill="#1A1A1A" opacity="0.1"/>
  <path d="M 400 280 L 365 280 A 35 35 0 0 1 400 245 Z" fill="none" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Floating elements -->
  <circle cx="80" cy="200" r="8" fill="#F27B6A" opacity="0.15"/>
  <circle cx="430" cy="150" r="10" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="120" cy="340" r="6" fill="#F27B6A" opacity="0.2"/>
  <circle cx="350" cy="350" r="8" fill="#7C5CFC" opacity="0.15"/>
</svg>