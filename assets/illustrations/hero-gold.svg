<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Stage 1: Raw Ore -->
  <circle cx="120" cy="200" r="40" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="120" cy="200" r="20" fill="#737373" opacity="0.3"/>
  <circle cx="110" cy="190" r="6" fill="#1A1A1A" opacity="0.4"/>
  <circle cx="130" cy="195" r="5" fill="#1A1A1A" opacity="0.3"/>
  <circle cx="115" cy="210" r="4" fill="#1A1A1A" opacity="0.3"/>
  <rect x="95" y="140" width="50" height="8" rx="4" fill="#1A1A1A"/>
  <text x="120" y="146" text-anchor="middle" fill="white" font-size="5" font-family="Inter" font-weight="600">ORE</text>

  <!-- Arrow 1 -->
  <path d="M 165 200 L 210 200" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M 205 195 L 215 200 L 205 205" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="190" cy="190" r="8" fill="#F27B6A" opacity="0.2"/>
  <path d="M 186 190 L 190 194 L 194 186" stroke="#F27B6A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stage 2: Processing -->
  <rect x="225" y="140" width="90" height="120" rx="12" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="245" y="160" width="50" height="6" rx="3" fill="#1A1A1A"/>
  
  <!-- Internal processing dots -->
  <circle cx="250" cy="190" r="5" fill="#F27B6A" opacity="0.5"/>
  <circle cx="270" cy="185" r="5" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="290" cy="192" r="5" fill="#F27B6A" opacity="0.3"/>
  <circle cx="260" cy="210" r="5" fill="#7C5CFC" opacity="0.5"/>
  <circle cx="280" cy="205" r="5" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="250" cy="225" r="5" fill="#7C5CFC" opacity="0.3"/>
  <circle cx="275" cy="230" r="5" fill="#F27B6A" opacity="0.4"/>
  <circle cx="295" cy="220" r="5" fill="#1A1A1A" opacity="0.15"/>
  
  <!-- Processing label -->
  <rect x="240" y="250" width="60" height="6" rx="3" fill="#737373"/>

  <!-- Arrow 2 -->
  <path d="M 320 200 L 365 200" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M 360 195 L 370 200 L 360 205" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="345" cy="190" r="8" fill="#F27B6A" opacity="0.2"/>
  <path d="M 341 190 L 345 194 L 349 186" stroke="#F27B6A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stage 3: Gold Bar / Finished -->
  <circle cx="430" cy="200" r="50" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="430" cy="200" r="35" fill="#F27B6A" opacity="0.15"/>
  <circle cx="430" cy="200" r="25" fill="#F27B6A" opacity="0.1"/>
  
  <!-- Star/badge in center -->
  <path d="M 430 175 L 435 190 L 450 190 L 438 200 L 443 215 L 430 205 L 417 215 L 422 200 L 410 190 L 425 190 Z" fill="#F27B6A" opacity="0.8"/>
  
  <!-- Label -->
  <rect x="400" y="140" width="60" height="8" rx="4" fill="#F27B6A"/>
  <text x="430" y="146" text-anchor="middle" fill="white" font-size="5" font-family="Inter" font-weight="600">99.9%</text>

  <!-- Floating particles -->
  <circle cx="180" cy="120" r="6" fill="#F27B6A" opacity="0.2"/>
  <circle cx="320" cy="110" r="5" fill="#F27B6A" opacity="0.15"/>
  <circle cx="380" cy="130" r="4" fill="#F27B6A" opacity="0.25"/>
  <circle cx="250" cy="320" r="7" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="350" cy="330" r="5" fill="#F27B6A" opacity="0.15"/>

  <!-- Bottom metrics -->
  <rect x="100" y="300" width="80" height="40" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="115" y="312" width="50" height="4" rx="2" fill="#737373"/>
  <rect x="115" y="322" width="30" height="6" rx="3" fill="#F27B6A"/>

  <rect x="220" y="300" width="80" height="40" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="235" y="312" width="50" height="4" rx="2" fill="#737373"/>
  <rect x="235" y="322" width="35" height="6" rx="3" fill="#7C5CFC"/>

  <rect x="340" y="300" width="80" height="40" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="355" y="312" width="50" height="4" rx="2" fill="#737373"/>
  <rect x="355" y="322" width="40" height="6" rx="3" fill="#1A1A1A"/>
</svg>
