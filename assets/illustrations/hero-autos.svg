<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Vehicle 1 (left) -->
  <rect x="60" y="160" width="110" height="70" rx="14" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="75" y="175" width="80" height="40" rx="8" fill="#F5F3EF"/>
  <circle cx="90" cy="225" r="8" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="140" cy="225" r="8" fill="#1A1A1A" opacity="0.2"/>
  <rect x="85" y="148" width="50" height="16" rx="4" fill="#F27B6A" opacity="0.15"/>
  <rect x="90" y="153" width="30" height="4" rx="2" fill="#F27B6A"/>

  <!-- Vehicle 2 (center, featured) -->
  <rect x="195" y="140" width="130" height="85" rx="16" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="212" y="158" width="96" height="50" rx="10" fill="#F5F3EF"/>
  <circle cx="230" cy="218" r="9" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="290" cy="218" r="9" fill="#1A1A1A" opacity="0.2"/>
  <rect x="220" y="128" width="60" height="16" rx="6" fill="#F27B6A"/>
  <rect x="230" y="134" width="30" height="4" rx="2" fill="white"/>
  <!-- Featured indicator -->
  <circle cx="320" cy="155" r="8" fill="#F27B6A" opacity="0.2"/>
  <path d="M 316 155 L 320 159 L 324 151" stroke="#F27B6A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vehicle 3 (right) -->
  <rect x="345" y="165" width="105" height="68" rx="14" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="360" y="180" width="75" height="38" rx="8" fill="#F5F3EF"/>
  <circle cx="375" cy="228" r="8" fill="#1A1A1A" opacity="0.2"/>
  <circle cx="420" cy="228" r="8" fill="#1A1A1A" opacity="0.2"/>
  <rect x="370" y="153" width="45" height="14" rx="4" fill="#7C5CFC" opacity="0.15"/>
  <rect x="375" y="158" width="25" height="4" rx="2" fill="#7C5CFC"/>

  <!-- Connecting lines -->
  <path d="M 175 195 L 190 185" stroke="#E5E5E5" stroke-width="1"/>
  <path d="M 330 185 L 340 195" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Inventory chart -->
  <rect x="380" y="80" width="100" height="80" rx="10" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="395" y="92" width="50" height="4" rx="2" fill="#1A1A1A"/>
  <rect x="395" y="110" width="10" height="30" rx="5" fill="#F27B6A" opacity="0.4"/>
  <rect x="410" y="100" width="10" height="40" rx="5" fill="#F27B6A" opacity="0.6"/>
  <rect x="425" y="95" width="10" height="45" rx="5" fill="#F27B6A"/>
  <rect x="440" y="105" width="10" height="35" rx="5" fill="#7C5CFC" opacity="0.5"/>
  <rect x="455" y="115" width="10" height="25" rx="5" fill="#F27B6A" opacity="0.3"/>

  <!-- Sales velocity arrow -->
  <path d="M 60 280 L 200 280" stroke="#F27B6A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 190 275 L 200 280 L 190 285" stroke="#F27B6A" stroke-width="2" stroke-linejoin="round"/>
  <rect x="80" y="268" width="80" height="4" rx="2" fill="#F27B6A" opacity="0.3"/>
  <rect x="80" y="276" width="60" height="4" rx="2" fill="#F27B6A" opacity="0.5"/>
  <rect x="80" y="284" width="40" height="4" rx="2" fill="#F27B6A"/>

  <!-- Floating elements -->
  <circle cx="120" cy="100" r="8" fill="#F27B6A" opacity="0.15"/>
  <circle cx="300" cy="80" r="10" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="450" cy="300" r="8" fill="#F27B6A" opacity="0.2"/>
</svg>