<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice" fill="none">
  <!-- Network graph nodes -->
  <!-- Central nodes -->
  <circle cx="300" cy="80" r="8" fill="#F27B6A" opacity="0.12"/>
  <circle cx="450" cy="150" r="6" fill="#F27B6A" opacity="0.1"/>
  <circle cx="600" cy="100" r="10" fill="#7C5CFC" opacity="0.08"/>
  <circle cx="750" cy="180" r="7" fill="#F27B6A" opacity="0.11"/>
  <circle cx="900" cy="120" r="9" fill="#7C5CFC" opacity="0.09"/>
  
  <!-- Secondary nodes -->
  <circle cx="200" cy="150" r="5" fill="#F27B6A" opacity="0.08"/>
  <circle cx="380" cy="220" r="6" fill="#7C5CFC" opacity="0.07"/>
  <circle cx="550" cy="240" r="5" fill="#F27B6A" opacity="0.09"/>
  <circle cx="680" cy="80" r="7" fill="#7C5CFC" opacity="0.06"/>
  <circle cx="820" cy="220" r="6" fill="#F27B6A" opacity="0.08"/>
  <circle cx="1000" cy="160" r="8" fill="#7C5CFC" opacity="0.07"/>
  <circle cx="1100" cy="100" r="5" fill="#F27B6A" opacity="0.1"/>
  <circle cx="150" cy="220" r="6" fill="#7C5CFC" opacity="0.06"/>

  <!-- Connecting lines -->
  <line x1="200" y1="150" x2="300" y2="80" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="300" y1="80" x2="450" y2="150" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="450" y1="150" x2="600" y2="100" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="100" x2="750" y2="180" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="750" y1="180" x2="900" y2="120" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="900" y1="120" x2="1000" y2="160" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="1000" y1="160" x2="1100" y2="100" stroke="white" stroke-width="0.5" opacity="0.04"/>
  
  <line x1="300" y1="80" x2="380" y2="220" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="450" y1="150" x2="550" y2="240" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="600" y1="100" x2="680" y2="80" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="750" y1="180" x2="820" y2="220" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="450" y1="150" x2="680" y2="80" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="600" y1="100" x2="820" y2="220" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="150" y1="220" x2="300" y2="80" stroke="white" stroke-width="0.5" opacity="0.03"/>

  <!-- Pulse rings on some nodes -->
  <circle cx="300" cy="80" r="14" fill="none" stroke="#F27B6A" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="100" r="18" fill="none" stroke="#7C5CFC" stroke-width="1" opacity="0.05"/>
  <circle cx="900" cy="120" r="16" fill="none" stroke="#F27B6A" stroke-width="1" opacity="0.05"/>
  <circle cx="450" cy="150" r="12" fill="none" stroke="#F27B6A" stroke-width="1" opacity="0.04"/>

  <!-- Larger accent nodes -->
  <circle cx="180" cy="100" r="24" fill="#F27B6A" opacity="0.04"/>
  <circle cx="950" cy="200" r="20" fill="#7C5CFC" opacity="0.03"/>
  <circle cx="700" cy="60" r="18" fill="#F27B6A" opacity="0.04"/>
  <circle cx="400" cy="260" r="22" fill="#7C5CFC" opacity="0.03"/>
</svg>