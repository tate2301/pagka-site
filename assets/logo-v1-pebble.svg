<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="c1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
    <linearGradient id="c1-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <!-- Outer pebble shape — rounded, approachable, stone-like -->
  <rect x="56" y="56" width="400" height="400" rx="120" fill="url(#c1-grad)" transform="rotate(45 256 256)"/>
  <!-- Inner core — offset slightly up-left for dynamic tension -->
  <circle cx="220" cy="220" r="72" fill="url(#c1-core)"/>
  <!-- Soft highlight on the pebble edge -->
  <rect x="72" y="72" width="368" height="368" rx="104" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.08" transform="rotate(45 256 256)"/>
</svg>
