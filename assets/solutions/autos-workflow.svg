<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 3D Isometric Auto Parts Workflow — Car outline, parts catalog, quote, invoice -->

  <!-- Node 1: Car / vehicle (charcoal block) -->
  <path d="M60 200 L130 165 L200 200 L130 235Z" fill="#262626" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M60 200 L60 270 L130 305 L130 235Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M130 235 L130 305 L200 270 L200 200Z" fill="#333333" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Car silhouette -->
  <path d="M95 195 L110 185 L125 185 L140 195 L140 205 L125 210 L110 210 L95 205Z" fill="#FFFFFF" opacity="0.15" transform="skewX(-30)"/>
  <circle cx="105" cy="208" r="4" fill="#FFFFFF" opacity="0.3" transform="skewX(-30)"/>
  <circle cx="130" cy="208" r="4" fill="#FFFFFF" opacity="0.3" transform="skewX(-30)"/>

  <!-- Flow arrow -->
  <line x1="200" y1="252" x2="250" y2="252" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="250,252 242,247 242,257" fill="#7C5CFC"/>

  <!-- Node 2: Parts catalog (violet block) -->
  <path d="M250 215 L320 180 L390 215 L320 250Z" fill="#7C5CFC" stroke="#6B4BE8" stroke-width="1.5"/>
  <path d="M250 215 L250 285 L320 320 L320 250Z" fill="#6B4BE8" stroke="#6B4BE8" stroke-width="1.5"/>
  <path d="M320 250 L320 320 L390 285 L390 215Z" fill="#7C5CFC" stroke="#6B4BE8" stroke-width="1.5"/>
  <!-- Catalog grid -->
  <rect x="275" y="195" width="18" height="18" rx="2" fill="#FFFFFF" opacity="0.3" transform="skewX(-30)"/>
  <rect x="298" y="195" width="18" height="18" rx="2" fill="#FFFFFF" opacity="0.2" transform="skewX(-30)"/>
  <rect x="275" y="218" width="18" height="18" rx="2" fill="#FFFFFF" opacity="0.2" transform="skewX(-30)"/>
  <rect x="298" y="218" width="18" height="18" rx="2" fill="#FFFFFF" opacity="0.3" transform="skewX(-30)"/>

  <!-- Flow arrow -->
  <line x1="390" y1="267" x2="440" y2="267" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="440,267 432,262 432,272" fill="#7C5CFC"/>

  <!-- Node 3: Quote / deal (coral block) -->
  <path d="M440 230 L510 195 L580 230 L510 265Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1.5"/>
  <path d="M440 230 L440 300 L510 335 L510 265Z" fill="#E56A5A" stroke="#E56A5A" stroke-width="1.5"/>
  <path d="M510 265 L510 335 L580 300 L580 230Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1.5"/>
  <!-- Quote lines -->
  <rect x="470" y="218" width="50" height="4" rx="1" fill="#FFFFFF" opacity="0.6" transform="skewX(-30)"/>
  <rect x="470" y="226" width="35" height="3" rx="1" fill="#FFFFFF" opacity="0.4" transform="skewX(-30)"/>
  <rect x="470" y="233" width="40" height="3" rx="1" fill="#FFFFFF" opacity="0.4" transform="skewX(-30)"/>

  <!-- Flow arrow down -->
  <line x1="510" y1="335" x2="510" y2="355" stroke="#1A1A1A" stroke-width="2"/>
  <polygon points="510,355 505,347 515,347" fill="#1A1A1A"/>

  <!-- Node 4: Invoice / financing (white card) -->
  <path d="M440 385 L510 350 L580 385 L510 420Z" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5"/>
  <path d="M440 385 L440 415 L510 450 L510 420Z" fill="#F5F3EF" stroke="#E5E5E5" stroke-width="1.5"/>
  <path d="M510 420 L510 450 L580 415 L580 385Z" fill="#FAF9F7" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- Invoice -->
  <rect x="465" y="372" width="45" height="4" rx="1" fill="#1A1A1A" opacity="0.15" transform="skewX(-30)"/>
  <rect x="465" y="380" width="30" height="3" rx="1" fill="#F27B6A" transform="skewX(-30)"/>
  <rect x="465" y="387" width="35" height="3" rx="1" fill="#1A1A1A" opacity="0.1" transform="skewX(-30)"/>

  <!-- Labels -->
  <text x="130" y="330" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Vehicle</text>
  <text x="320" y="345" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Parts</text>
  <text x="510" y="360" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Quote</text>
  <text x="510" y="470" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Invoice</text>

  <!-- Corner dots -->
  <circle cx="50" cy="180" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="180" r="3" fill="#7C5CFC" opacity="0.4"/>
</svg>