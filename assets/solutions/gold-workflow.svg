<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 3D Isometric Gold Workflow — Gold bars, scales, flow arrows -->
  
  <!-- Node 1: Gold pour / intake (charcoal cube) -->
  <path d="M80 200 L140 170 L200 200 L140 230Z" fill="#262626" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M80 200 L80 260 L140 290 L140 230Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M140 230 L140 290 L200 260 L200 200Z" fill="#333333" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Gold bar inside -->
  <path d="M110 200 L140 185 L170 200 L140 215Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1"/>
  <path d="M110 200 L110 220 L140 235 L140 215Z" fill="#E56A5A" stroke="#E56A5A" stroke-width="1"/>
  <path d="M140 215 L140 235 L170 220 L170 200Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1"/>
  
  <!-- Flow arrow 1 → 2 -->
  <line x1="200" y1="245" x2="260" y2="245" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="260,245 252,240 252,250" fill="#7C5CFC"/>
  
  <!-- Node 2: Scale / weighing (violet cube) -->
  <path d="M260 215 L320 185 L380 215 L320 245Z" fill="#7C5CFC" stroke="#6B4BE8" stroke-width="1.5"/>
  <path d="M260 215 L260 275 L320 305 L320 245Z" fill="#6B4BE8" stroke="#6B4BE8" stroke-width="1.5"/>
  <path d="M320 245 L320 305 L380 275 L380 215Z" fill="#7C5CFC" stroke="#6B4BE8" stroke-width="1.5"/>
  <!-- Scale plate -->
  <line x1="290" y1="220" x2="350" y2="220" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="320" y1="220" x2="320" y2="235" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Weight display -->
  <rect x="300" y="205" width="36" height="10" rx="1" fill="#FFFFFF" opacity="0.8" transform="skewX(-30)"/>
  
  <!-- Flow arrow 2 → 3 -->
  <line x1="380" y1="260" x2="440" y2="260" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="440,260 432,255 432,265" fill="#7C5CFC"/>
  
  <!-- Node 3: Gold bars / storage (coral stack) -->
  <path d="M440 230 L500 200 L560 230 L500 260Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1.5"/>
  <path d="M440 230 L440 290 L500 320 L500 260Z" fill="#E56A5A" stroke="#E56A5A" stroke-width="1.5"/>
  <path d="M500 260 L500 320 L560 290 L560 230Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1.5"/>
  <!-- Stacked bars -->
  <path d="M470 235 L500 220 L530 235 L500 250Z" fill="#FFFFFF" opacity="0.3" stroke="#FFFFFF" stroke-width="0.5"/>
  <path d="M470 248 L500 233 L530 248 L500 263Z" fill="#FFFFFF" opacity="0.5" stroke="#FFFFFF" stroke-width="0.5"/>
  <path d="M470 261 L500 246 L530 261 L500 276Z" fill="#FFFFFF" opacity="0.7" stroke="#FFFFFF" stroke-width="0.5"/>
  
  <!-- Flow arrow 3 → 4 -->
  <line x1="500" y1="320" x2="500" y2="340" stroke="#1A1A1A" stroke-width="2"/>
  <polygon points="500,340 495,332 505,332" fill="#1A1A1A"/>
  
  <!-- Node 4: Invoice / settlement (white card) -->
  <path d="M440 360 L500 330 L560 360 L500 390Z" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5"/>
  <path d="M440 360 L440 390 L500 420 L500 390Z" fill="#F5F3EF" stroke="#E5E5E5" stroke-width="1.5"/>
  <path d="M500 390 L500 420 L560 390 L560 360Z" fill="#FAF9F7" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- Invoice lines -->
  <rect x="470" y="355" width="50" height="4" rx="1" fill="#1A1A1A" opacity="0.2" transform="skewX(-30)"/>
  <rect x="470" y="363" width="30" height="3" rx="1" fill="#F27B6A" transform="skewX(-30)"/>
  <rect x="470" y="370" width="40" height="3" rx="1" fill="#1A1A1A" opacity="0.1" transform="skewX(-30)"/>
  
  <!-- Label row -->
  <text x="140" y="320" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Intake</text>
  <text x="320" y="335" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Weigh</text>
  <text x="500" y="350" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Store</text>
  <text x="500" y="445" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Settle</text>
  
  <!-- Corner accent dots -->
  <circle cx="60" cy="180" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="580" cy="180" r="3" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="60" cy="380" r="3" fill="#7C5CFC" opacity="0.3"/>
</svg>