<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Flat Vector Maintenance Workflow — Wrench → gear → ticket → checkmark -->

  <!-- Node 1: Wrench / equipment (charcoal icon) -->
  <circle cx="100" cy="180" r="45" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.12"/>
  <circle cx="100" cy="180" r="38" fill="#1A1A1A" opacity="0.04"/>
  <!-- Wrench shape -->
  <path d="M85 170 L95 160 L105 170 L95 180Z" fill="#1A1A1A" opacity="0.8"/>
  <rect x="92" y="175" width="16" height="4" rx="1" fill="#1A1A1A" opacity="0.6" transform="rotate(45 100 177)"/>
  <path d="M105 185 L115 195 L110 200 L100 190Z" fill="#1A1A1A" opacity="0.8"/>

  <!-- Flow line -->
  <line x1="150" y1="180" x2="190" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="190,180 182,175 182,185" fill="#7C5CFC"/>

  <!-- Node 2: Gear / work order (violet) -->
  <circle cx="240" cy="180" r="45" fill="none" stroke="#7C5CFC" stroke-width="2"/>
  <circle cx="240" cy="180" r="38" fill="#7C5CFC" opacity="0.06"/>
  <!-- Gear teeth -->
  <rect x="235" y="138" width="10" height="8" rx="1" fill="#7C5CFC" opacity="0.5"/>
  <rect x="235" y="214" width="10" height="8" rx="1" fill="#7C5CFC" opacity="0.5"/>
  <rect x="198" y="175" width="8" height="10" rx="1" fill="#7C5CFC" opacity="0.5"/>
  <rect x="274" y="175" width="8" height="10" rx="1" fill="#7C5CFC" opacity="0.5"/>
  <rect x="210" y="150" width="8" height="8" rx="1" fill="#7C5CFC" opacity="0.4" transform="rotate(45 214 154)"/>
  <rect x="262" y="150" width="8" height="8" rx="1" fill="#7C5CFC" opacity="0.4" transform="rotate(45 266 154)"/>
  <rect x="210" y="202" width="8" height="8" rx="1" fill="#7C5CFC" opacity="0.4" transform="rotate(45 214 206)"/>
  <rect x="262" y="202" width="8" height="8" rx="1" fill="#7C5CFC" opacity="0.4" transform="rotate(45 266 206)"/>
  <!-- Center hole -->
  <circle cx="240" cy="180" r="10" fill="none" stroke="#7C5CFC" stroke-width="1.5"/>

  <!-- Flow line -->
  <line x1="290" y1="180" x2="330" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="330,180 322,175 322,185" fill="#7C5CFC"/>

  <!-- Node 3: Ticket / work order (coral card) -->
  <rect x="350" y="140" width="60" height="80" rx="4" fill="none" stroke="#F27B6A" stroke-width="2"/>
  <rect x="358" y="150" width="44" height="20" rx="2" fill="#F27B6A" opacity="0.08"/>
  <!-- Ticket lines -->
  <rect x="358" y="180" width="30" height="3" rx="1" fill="#F27B6A" opacity="0.4"/>
  <rect x="358" y="188" width="40" height="3" rx="1" fill="#F27B6A" opacity="0.25"/>
  <rect x="358" y="196" width="35" height="3" rx="1" fill="#F27B6A" opacity="0.25"/>
  <!-- Ticket notch -->
  <circle cx="350" cy="180" r="4" fill="white" stroke="#F27B6A" stroke-width="1.5"/>
  <circle cx="410" cy="180" r="4" fill="white" stroke="#F27B6A" stroke-width="1.5"/>

  <!-- Flow line -->
  <line x1="415" y1="180" x2="455" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="455,180 447,175 447,185" fill="#7C5CFC"/>

  <!-- Node 4: Checkmark done (violet circle) -->
  <circle cx="510" cy="180" r="40" fill="none" stroke="#7C5CFC" stroke-width="2"/>
  <circle cx="510" cy="180" r="34" fill="#7C5CFC" opacity="0.06"/>
  <path d="M495 180 L505 192 L525 170" stroke="#7C5CFC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Labels -->
  <text x="100" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Equipment</text>
  <text x="240" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Work Order</text>
  <text x="380" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Assign</text>
  <text x="510" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Done</text>

  <!-- Bottom line -->
  <line x1="100" y1="250" x2="510" y2="250" stroke="#1A1A1A" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Corner dots -->
  <circle cx="50" cy="120" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="120" r="3" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="50" cy="320" r="3" fill="#7C5CFC" opacity="0.3"/>
</svg>