<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Flat Vector Compliance Workflow — Calculator → ZIMRA shape → report pages → checkmark -->

  <!-- Node 1: Calculator (charcoal) -->
  <rect x="70" y="140" width="60" height="80" rx="4" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Display -->
  <rect x="78" y="150" width="44" height="18" rx="2" fill="#1A1A1A" opacity="0.06"/>
  <rect x="82" y="156" width="25" height="4" rx="1" fill="#1A1A1A" opacity="0.2"/>
  <!-- Buttons -->
  <rect x="78" y="174" width="10" height="10" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="92" y="174" width="10" height="10" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="106" y="174" width="10" height="10" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="78" y="188" width="10" height="10" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="92" y="188" width="10" height="10" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="106" y="188" width="10" height="10" rx="1" fill="#F27B6A" opacity="0.4"/>
  <rect x="78" y="202" width="38" height="10" rx="1" fill="#7C5CFC" opacity="0.2"/>

  <!-- Flow line -->
  <line x1="135" y1="180" x2="175" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="175,180 167,175 167,185" fill="#7C5CFC"/>

  <!-- Node 2: ZIMRA shape (shield/badge) -->
  <path d="M200 155 L230 140 L260 155 L260 195 L230 210 L200 195Z" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M215 165 L230 155 L245 165 L245 185 L230 195 L215 185Z" fill="#1A1A1A" opacity="0.06"/>
  <!-- Z text -->
  <text x="230" y="182" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="14" font-weight="700">Z</text>

  <!-- Flow line -->
  <line x1="265" y1="180" x2="305" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="305,180 297,175 297,185" fill="#7C5CFC"/>

  <!-- Node 3: Report pages (stacked docs) -->
  <!-- Page 3 (back) -->
  <rect x="320" y="150" width="50" height="65" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.3" transform="rotate(-5 345 182)"/>
  <!-- Page 2 (middle) -->
  <rect x="325" y="148" width="50" height="65" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.5" transform="rotate(-2 350 180)"/>
  <!-- Page 1 (front) -->
  <rect x="330" y="145" width="50" height="65" rx="3" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Lines on front page -->
  <rect x="338" y="158" width="34" height="3" rx="1" fill="#1A1A1A" opacity="0.15"/>
  <rect x="338" y="168" width="25" height="3" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="338" y="178" width="30" height="3" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="338" y="188" width="20" height="3" rx="1" fill="#F27B6A" opacity="0.4"/>

  <!-- Flow line -->
  <line x1="385" y1="180" x2="425" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="425,180 417,175 417,185" fill="#7C5CFC"/>

  <!-- Node 4: Checkmark (circle) -->
  <circle cx="470" cy="180" r="40" fill="none" stroke="#7C5CFC" stroke-width="2"/>
  <circle cx="470" cy="180" r="35" fill="#7C5CFC" opacity="0.08"/>
  <path d="M455 180 L465 190 L485 168" stroke="#7C5CFC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Labels below -->
  <text x="100" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Calculate</text>
  <text x="230" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">ZIMRA</text>
  <text x="355" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Report</text>
  <text x="470" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Compliant</text>

  <!-- Thin bottom line -->
  <line x1="100" y1="250" x2="470" y2="250" stroke="#1A1A1A" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Corner dots -->
  <circle cx="50" cy="120" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="120" r="3" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="50" cy="320" r="3" fill="#7C5CFC" opacity="0.3"/>
</svg>