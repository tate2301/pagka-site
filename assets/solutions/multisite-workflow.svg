<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Flat Vector Multisite Workflow — Connected site nodes with hub -->

  <!-- Central hub -->
  <circle cx="300" cy="200" r="55" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="300" cy="200" r="48" fill="#1A1A1A" opacity="0.04"/>
  <!-- Hub icon: layered squares -->
  <rect x="285" y="185" width="30" height="30" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="290" y="190" width="20" height="20" rx="2" fill="none" stroke="#7C5CFC" stroke-width="1.5"/>
  <circle cx="300" cy="200" r="5" fill="#F27B6A"/>

  <!-- Site 1: Top -->
  <rect x="270" y="60" width="60" height="50" rx="4" fill="none" stroke="#F27B6A" stroke-width="2"/>
  <rect x="280" y="72" width="40" height="28" rx="2" fill="#F27B6A" opacity="0.08"/>
  <rect x="285" y="78" width="20" height="4" rx="1" fill="#F27B6A" opacity="0.4"/>
  <rect x="285" y="86" width="30" height="3" rx="1" fill="#F27B6A" opacity="0.25"/>
  <!-- Connection to hub -->
  <line x1="300" y1="110" x2="300" y2="145" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Site 2: Bottom-left -->
  <rect x="80" y="280" width="60" height="50" rx="4" fill="none" stroke="#7C5CFC" stroke-width="2"/>
  <rect x="90" y="292" width="40" height="28" rx="2" fill="#7C5CFC" opacity="0.08"/>
  <rect x="95" y="298" width="20" height="4" rx="1" fill="#7C5CFC" opacity="0.4"/>
  <rect x="95" y="306" width="30" height="3" rx="1" fill="#7C5CFC" opacity="0.25"/>
  <!-- Connection to hub -->
  <line x1="135" y1="290" x2="255" y2="225" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Site 3: Bottom-right -->
  <rect x="460" y="280" width="60" height="50" rx="4" fill="none" stroke="#F27B6A" stroke-width="2"/>
  <rect x="470" y="292" width="40" height="28" rx="2" fill="#F27B6A" opacity="0.08"/>
  <rect x="475" y="298" width="20" height="4" rx="1" fill="#F27B6A" opacity="0.4"/>
  <rect x="475" y="306" width="30" height="3" rx="1" fill="#F27B6A" opacity="0.25"/>
  <!-- Connection to hub -->
  <line x1="465" y1="290" x2="345" y2="225" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Site 4: Left -->
  <rect x="50" y="140" width="60" height="50" rx="4" fill="none" stroke="#7C5CFC" stroke-width="2"/>
  <rect x="60" y="152" width="40" height="28" rx="2" fill="#7C5CFC" opacity="0.08"/>
  <rect x="65" y="158" width="20" height="4" rx="1" fill="#7C5CFC" opacity="0.4"/>
  <!-- Connection to hub -->
  <line x1="110" y1="165" x2="245" y2="190" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Site 5: Right -->
  <rect x="490" y="140" width="60" height="50" rx="4" fill="none" stroke="#F27B6A" stroke-width="2"/>
  <rect x="500" y="152" width="40" height="28" rx="2" fill="#F27B6A" opacity="0.08"/>
  <rect x="505" y="158" width="20" height="4" rx="1" fill="#F27B6A" opacity="0.4"/>
  <!-- Connection to hub -->
  <line x1="490" y1="165" x2="355" y2="190" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Labels -->
  <text x="300" y="55" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">HQ</text>
  <text x="110" y="355" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Branch 1</text>
  <text x="490" y="355" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Branch 2</text>
  <text x="80" y="120" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="11" font-weight="600">Site A</text>
  <text x="520" y="120" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="11" font-weight="600">Site B</text>
  <text x="300" y="285" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">One System</text>

  <!-- Corner dots -->
  <circle cx="50" cy="50" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="50" r="3" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="50" cy="360" r="3" fill="#7C5CFC" opacity="0.3"/>
</svg>