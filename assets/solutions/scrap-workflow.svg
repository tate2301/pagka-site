<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 3D Isometric Scrap Workflow — Truck, metal pile, weighing, receipt -->

  <!-- Node 1: Truck / delivery (charcoal block) -->
  <path d="M60 210 L120 180 L180 210 L120 240Z" fill="#262626" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M60 210 L60 270 L120 300 L120 240Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M120 240 L120 300 L180 270 L180 210Z" fill="#333333" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Truck bed -->
  <rect x="85" y="195" width="50" height="20" rx="2" fill="#F27B6A" opacity="0.4" transform="skewX(-30)"/>
  <circle cx="95" cy="235" r="5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="145" cy="235" r="5" fill="#FFFFFF" opacity="0.3"/>

  <!-- Flow arrow -->
  <line x1="180" y1="255" x2="230" y2="255" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="230,255 222,250 222,260" fill="#7C5CFC"/>

  <!-- Node 2: Metal pile / yard (coral block) -->
  <path d="M230 225 L290 195 L350 225 L290 255Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1.5"/>
  <path d="M230 225 L230 285 L290 315 L290 255Z" fill="#E56A5A" stroke="#E56A5A" stroke-width="1.5"/>
  <path d="M290 255 L290 315 L350 285 L350 225Z" fill="#F27B6A" stroke="#E56A5A" stroke-width="1.5"/>
  <!-- Metal pieces -->
  <path d="M255 220 L270 212 L285 220 L270 228Z" fill="#FFFFFF" opacity="0.3"/>
  <path d="M275 230 L290 222 L305 230 L290 238Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M265 240 L280 232 L295 240 L280 248Z" fill="#FFFFFF" opacity="0.4"/>

  <!-- Flow arrow -->
  <line x1="350" y1="270" x2="400" y2="270" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="400,270 392,265 392,275" fill="#7C5CFC"/>

  <!-- Node 3: Weighing scale (violet block) -->
  <path d="M400 240 L460 210 L520 240 L460 270Z" fill="#7C5CFC" stroke="#6B4BE8" stroke-width="1.5"/>
  <path d="M400 240 L400 300 L460 330 L460 270Z" fill="#6B4BE8" stroke="#6B4BE8" stroke-width="1.5"/>
  <path d="M460 270 L460 330 L520 300 L520 240Z" fill="#7C5CFC" stroke="#6B4BE8" stroke-width="1.5"/>
  <!-- Scale -->
  <rect x="430" y="230" width="40" height="8" rx="1" fill="#FFFFFF" opacity="0.7" transform="skewX(-30)"/>
  <line x1="450" y1="238" x2="450" y2="250" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="440" y="250" width="20" height="12" rx="1" fill="#FFFFFF" opacity="0.4" transform="skewX(-30)"/>

  <!-- Flow arrow -->
  <line x1="460" y1="330" x2="460" y2="350" stroke="#1A1A1A" stroke-width="2"/>
  <polygon points="460,350 455,342 465,342" fill="#1A1A1A"/>

  <!-- Node 4: Receipt / cash (white card) -->
  <path d="M400 370 L460 340 L520 370 L460 400Z" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5"/>
  <path d="M400 370 L400 400 L460 430 L460 400Z" fill="#F5F3EF" stroke="#E5E5E5" stroke-width="1.5"/>
  <path d="M460 400 L460 430 L520 400 L520 370Z" fill="#FAF9F7" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- Receipt lines -->
  <rect x="425" y="365" width="50" height="3" rx="1" fill="#1A1A1A" opacity="0.15" transform="skewX(-30)"/>
  <rect x="425" y="372" width="35" height="3" rx="1" fill="#1A1A1A" opacity="0.1" transform="skewX(-30)"/>
  <rect x="425" y="379" width="40" height="3" rx="1" fill="#F27B6A" transform="skewX(-30)"/>

  <!-- Labels -->
  <text x="120" y="330" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Collect</text>
  <text x="290" y="345" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Sort</text>
  <text x="460" y="360" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Weigh</text>
  <text x="460" y="455" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Pay</text>

  <!-- Corner dots -->
  <circle cx="50" cy="190" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="190" r="3" fill="#7C5CFC" opacity="0.4"/>
</svg>