<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Flat Vector CCTV Workflow — Camera nodes, monitoring screen, alert -->

  <!-- Node 1: Camera 1 (top-left node) -->
  <circle cx="120" cy="120" r="40" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.15"/>
  <rect x="105" y="108" width="30" height="20" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="120" cy="118" r="6" fill="#1A1A1A"/>
  <path d="M135 118 L142 115 L142 121Z" fill="#1A1A1A"/>
  <!-- Connection line to hub -->
  <line x1="155" y1="135" x2="220" y2="195" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Node 2: Camera 2 (top-right node) -->
  <circle cx="480" cy="120" r="40" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.15"/>
  <rect x="465" y="108" width="30" height="20" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="480" cy="118" r="6" fill="#1A1A1A"/>
  <path d="M495 118 L502 115 L502 121Z" fill="#1A1A1A"/>
  <!-- Connection line to hub -->
  <line x1="445" y1="135" x2="380" y2="195" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Node 3: Camera 3 (bottom-left node) -->
  <circle cx="120" cy="300" r="40" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.15"/>
  <rect x="105" y="288" width="30" height="20" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="120" cy="298" r="6" fill="#1A1A1A"/>
  <path d="M135 298 L142 295 L142 301Z" fill="#1A1A1A"/>
  <!-- Connection line to hub -->
  <line x1="155" y1="285" x2="220" y2="225" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Node 4: Camera 4 (bottom-right node) -->
  <circle cx="480" cy="300" r="40" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.15"/>
  <rect x="465" y="288" width="30" height="20" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="480" cy="298" r="6" fill="#1A1A1A"/>
  <path d="M495 298 L502 295 L502 301Z" fill="#1A1A1A"/>
  <!-- Connection line to hub -->
  <line x1="445" y1="285" x2="380" y2="225" stroke="#7C5CFC" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Center hub: Monitoring screen -->
  <rect x="250" y="160" width="100" height="80" rx="6" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="260" y="170" width="80" height="50" rx="3" fill="#1A1A1A" opacity="0.04"/>
  <!-- Screen quadrants -->
  <line x1="300" y1="170" x2="300" y2="220" stroke="#1A1A1A" stroke-width="0.5" opacity="0.2"/>
  <line x1="260" y1="195" x2="340" y2="195" stroke="#1A1A1A" stroke-width="0.5" opacity="0.2"/>
  <!-- Live dots -->
  <circle cx="270" cy="180" r="2" fill="#F27B6A"/>
  <circle cx="310" cy="180" r="2" fill="#F27B6A"/>
  <circle cx="270" cy="205" r="2" fill="#F27B6A"/>
  <circle cx="310" cy="205" r="2" fill="#7C5CFC"/>
  <!-- Stand -->
  <line x1="300" y1="240" x2="300" y2="260" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="280" y="260" width="40" height="6" rx="2" fill="#1A1A1A" opacity="0.2"/>

  <!-- Alert badge -->
  <rect x="340" y="140" width="70" height="24" rx="4" fill="#F27B6A"/>
  <text x="375" y="157" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="600">Motion Alert</text>

  <!-- Recording indicator -->
  <circle cx="265" y="152" r="5" fill="#F27B6A"/>
  <text x="265" y="155" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="6" font-weight="700">REC</text>

  <!-- Labels -->
  <text x="120" y="80" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="11" font-weight="600">Cam 1</text>
  <text x="480" y="80" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="11" font-weight="600">Cam 2</text>
  <text x="120" y="360" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="11" font-weight="600">Cam 3</text>
  <text x="480" y="360" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="11" font-weight="600">Cam 4</text>
  <text x="300" y="285" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Monitor</text>

  <!-- Corner dots -->
  <circle cx="50" cy="50" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="50" r="3" fill="#7C5CFC" opacity="0.4"/>
</svg>