<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Flat Vector Thrift Workflow — Items → pricing → sale → receipt -->

  <!-- Node 1: Items / donation bag (charcoal) -->
  <circle cx="100" cy="180" r="45" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.12"/>
  <circle cx="100" cy="180" r="38" fill="#1A1A1A" opacity="0.04"/>
  <!-- Bag shape -->
  <path d="M85 170 Q100 160 115 170 L120 195 Q100 205 80 195Z" fill="#1A1A1A" opacity="0.3"/>
  <path d="M90 170 Q100 160 110 170" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Item peeking out -->
  <rect x="95" y="162" width="10" height="12" rx="2" fill="#F27B6A" opacity="0.5"/>

  <!-- Flow line -->
  <line x1="150" y1="180" x2="190" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="190,180 182,175 182,185" fill="#7C5CFC"/>

  <!-- Node 2: Pricing tag (violet card) -->
  <rect x="210" y="140" width="60" height="80" rx="4" fill="none" stroke="#7C5CFC" stroke-width="2"/>
  <rect x="218" y="150" width="44" height="50" rx="2" fill="#7C5CFC" opacity="0.06"/>
  <!-- Tag shape -->
  <path d="M235 160 L255 160 L265 175 L255 190 L235 190 L225 175Z" fill="none" stroke="#7C5CFC" stroke-width="1.5"/>
  <circle cx="240" cy="175" r="3" fill="#7C5CFC"/>
  <text x="248" y="179" fill="#7C5CFC" font-family="Inter, sans-serif" font-size="10" font-weight="600">$5</text>

  <!-- Flow line -->
  <line x1="275" y1="180" x2="315" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="315,180 307,175 307,185" fill="#7C5CFC"/>

  <!-- Node 3: Sale / cart (coral) -->
  <circle cx="360" cy="180" r="45" fill="none" stroke="#F27B6A" stroke-width="2"/>
  <circle cx="360" cy="180" r="38" fill="#F27B6A" opacity="0.06"/>
  <!-- Cart -->
  <path d="M345 175 L355 175 L358 190 L348 190Z" fill="none" stroke="#F27B6A" stroke-width="1.5"/>
  <circle cx="348" cy="195" r="3" fill="none" stroke="#F27B6A" stroke-width="1"/>
  <circle cx="358" cy="195" r="3" fill="none" stroke="#F27B6A" stroke-width="1"/>
  <path d="M342 170 L345 175" stroke="#F27B6A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Item in cart -->
  <rect x="350" y="178" width="6" height="6" rx="1" fill="#F27B6A" opacity="0.5"/>

  <!-- Flow line -->
  <line x1="410" y1="180" x2="450" y2="180" stroke="#7C5CFC" stroke-width="2"/>
  <polygon points="450,180 442,175 442,185" fill="#7C5CFC"/>

  <!-- Node 4: Receipt (white card) -->
  <rect x="470" y="140" width="60" height="80" rx="4" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="478" y="150" width="44" height="60" rx="2" fill="#1A1A1A" opacity="0.03"/>
  <!-- Receipt lines -->
  <rect x="482" y="160" width="30" height="3" rx="1" fill="#1A1A1A" opacity="0.15"/>
  <rect x="482" y="168" width="25" height="3" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <rect x="482" y="176" width="35" height="3" rx="1" fill="#1A1A1A" opacity="0.1"/>
  <line x1="482" y1="188" x2="518" y2="188" stroke="#1A1A1A" stroke-width="0.5" stroke-dasharray="2 2"/>
  <rect x="482" y="195" width="20" height="3" rx="1" fill="#F27B6A"/>
  <!-- Zigzag bottom -->
  <path d="M478 210 L482 214 L486 210 L490 214 L494 210 L498 214 L502 210 L506 214 L510 210 L514 214 L518 210" stroke="#1A1A1A" stroke-width="0.5" fill="none"/>

  <!-- Labels -->
  <text x="100" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Donate</text>
  <text x="240" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Price</text>
  <text x="360" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Sell</text>
  <text x="500" y="270" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="600">Receipt</text>

  <!-- Bottom line -->
  <line x1="100" y1="250" x2="500" y2="250" stroke="#1A1A1A" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Corner dots -->
  <circle cx="50" cy="120" r="4" fill="#F27B6A" opacity="0.4"/>
  <circle cx="550" cy="120" r="3" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="50" cy="320" r="3" fill="#7C5CFC" opacity="0.3"/>
</svg>