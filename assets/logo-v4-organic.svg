<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="c4-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
    <linearGradient id="c4-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <!-- Organic pebble shape — friendly, hand-polished feel -->
  <path d="M256 48 
           C360 48 448 120 464 224 
           C480 328 400 448 256 464 
           C112 448 32 328 48 224 
           C64 120 152 48 256 48Z" 
        fill="url(#c4-grad)"/>
  <!-- Inner glow/core — offset for depth -->
  <ellipse cx="240" cy="220" rx="80" ry="72" fill="url(#c4-glow)"/>
  <!-- Highlight curve — Mailchimp-friendly personality -->
  <path d="M160 160 Q220 120 280 140" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.15"/>
  <!-- Soft shadow/grounding -->
  <ellipse cx="256" cy="440" rx="120" ry="16" fill="#000000" opacity="0.15"/>
</svg>