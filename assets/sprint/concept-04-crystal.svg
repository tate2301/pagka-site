<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 4: The Crystal -->
  <!-- Angular, faceted, refracting — precision and clarity -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Main crystal shape -->
    <polygon points="0,-80 40,-40 40,20 0,60 -40,20 -40,-40" fill="#1A1A1A"/>
    <!-- Inner facets -->
    <polygon points="0,-80 40,-40 0,-20 -40,-40" fill="#2D2D2D"/>
    <polygon points="40,-40 40,20 0,0 0,-20" fill="#252525"/>
    <polygon points="-40,-40 0,-20 0,0 -40,20" fill="#333333"/>
    <polygon points="0,-20 40,20 0,60 -40,20" fill="#1F1F1F"/>
    <!-- Refracted light at center -->
    <polygon points="0,-10 15,5 0,20 -15,5" fill="url(#crystalGrad)" opacity="0.95"/>
  </g>
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 4: THE CRYSTAL</text>
</svg>
