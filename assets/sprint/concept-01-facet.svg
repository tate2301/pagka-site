<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 1: The Facet -->
  <!-- A hexagonal stone with faceted surfaces -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Outer hexagon -->
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35" fill="#1A1A1A"/>
    <!-- Facet lines creating depth -->
    <polygon points="0,-70 60,-35 0,0 -60,-35" fill="#2D2D2D"/>
    <polygon points="60,-35 60,35 0,0" fill="#252525"/>
    <polygon points="-60,-35 -60,35 0,0" fill="#333333"/>
    <!-- Center highlight -->
    <polygon points="0,-20 20,-10 0,20 -20,-10" fill="url(#facetGrad)" opacity="0.9"/>
  </g>
  <defs>
    <linearGradient id="facetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 1: THE FACET</text>
</svg>
