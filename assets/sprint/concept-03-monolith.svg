<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 3: The Monolith -->
  <!-- A tall, solid vertical mark — strong and unshakeable -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Outer rounded rectangle -->
    <rect x="-40" y="-70" width="80" height="140" rx="40" fill="#1A1A1A"/>
    <!-- Inner core stripe -->
    <rect x="-16" y="-50" width="32" height="100" rx="16" fill="url(#monoGrad)"/>
    <!-- Subtle highlight -->
    <rect x="-32" y="-60" width="16" height="120" rx="8" fill="#FFFFFF" opacity="0.06"/>
  </g>
  <defs>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 3: THE MONOLITH</text>
</svg>
