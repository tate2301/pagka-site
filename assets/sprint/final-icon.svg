<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="50%" style="stop-color:#D96BA8"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
    <radialGradient id="finGlow" cx="55%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#F27B6A; stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#F27B6A; stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Outer stone: circle with sector removed -->
  <path d="M 256,76 A 180,180 0 1,1 128.72,383.28 L 256,256 Z" fill="#1A1A1A"/>
  
  <!-- Cut face (depth) -->
  <path d="M 256,256 L 128.72,383.28 A 180,180 0 0,0 228.72,78.09 Z" fill="#252525"/>
  
  <!-- The core -->
  <circle cx="312.57" cy="199.43" r="56" fill="url(#finGrad)"/>
  
  <!-- Core glow -->
  <circle cx="312.57" cy="199.43" r="72" fill="url(#finGlow)"/>
  
  <!-- Core highlight -->
  <ellipse cx="298" cy="184" rx="16" ry="10" fill="#FFFFFF" opacity="0.25" transform="rotate(-45 298 184)"/>
  
  <!-- Stone edge highlight -->
  <path d="M 256,76 A 180,180 0 0,1 383.28,128.72" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
</svg>
