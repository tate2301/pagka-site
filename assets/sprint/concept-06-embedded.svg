<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 6: The Embedded Core -->
  <!-- A pebble with something glowing inside — hidden power -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Outer organic pebble -->
    <path d="M -50,-60 C -10,-75 30,-70 55,-40 C 75,-10 70,30 45,55 C 15,75 -25,70 -50,45 C -75,15 -70,-25 -50,-60Z" fill="#1A1A1A"/>
    <!-- Surface highlight -->
    <path d="M -35,-50 C -10,-60 20,-55 35,-35" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.08"/>
    <!-- The embedded core — glowing from within -->
    <ellipse cx="10" cy="-5" rx="28" ry="22" fill="url(#embedGrad)"/>
    <!-- Inner light spill -->
    <ellipse cx="10" cy="-5" rx="36" ry="28" fill="url(#embedGrad)" opacity="0.3"/>
  </g>
  <defs>
    <linearGradient id="embedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 6: EMBEDDED CORE</text>
</svg>
