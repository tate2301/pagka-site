<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm gradient for the core -->
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="50%" style="stop-color:#D96BA8"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
    
    <!-- Subtle inner glow for depth -->
    <radialGradient id="glowGrad" cx="55%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#F27B6A; stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#F27B6A; stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#FAF9F7"/>
  
  <!-- ===== CONSTRUCTION GRID (visible) ===== -->
  <g opacity="0.08">
    <!-- 8x8 grid -->
    <line x1="64" y1="0" x2="64" y2="512" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="512" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="320" y1="0" x2="320" y2="512" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="448" y1="0" x2="448" y2="512" stroke="#1A1A1A" stroke-width="1"/>
    
    <line x1="0" y1="64" x2="512" y2="64" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="#1A1A1A" stroke-width="1"/>
    
    <!-- Golden ratio circles -->
    <circle cx="256" cy="256" r="112" fill="none" stroke="#7C5CFC" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="256" cy="256" r="180" fill="none" stroke="#F27B6A" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="256" cy="256" r="224" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="2,6"/>
  </g>
  
  <!-- ===== THE LOGO ===== -->
  <g transform="translate(256, 256)">
    <!-- 
      OUTER STONE
      Center at (0,0), radius = 180px (7 grid units)
      The stone is a circle with a sector removed
    -->
    <!-- Main stone body -->
    <path d="M 0,-180 
             A 180,180 0 1,1 -127.28,127.28 
             L 0,0 Z" 
          fill="#1A1A1A"/>
    
    <!-- 
      THE CUT FACE (inner wall of the reveal)
      Creates depth — the inner wall catches light differently
    -->
    <path d="M 0,0 
             L -127.28,127.28 
             A 180,180 0 0,0 -27.28,-177.91 
             Z" 
          fill="#252525"/>
    
    <!-- 
      THE CORE
      Positioned where the cut reveals it
      Center: 45° from vertical, radius = 80px (3.125 grid units)
      Core radius: 56px (2.2 grid units)
    -->
    <circle cx="56.57" cy="-56.57" r="56" fill="url(#coreGrad)"/>
    
    <!-- Inner glow bleed -->
    <circle cx="56.57" cy="-56.57" r="72" fill="url(#glowGrad)"/>
    
    <!-- 
      CORE HIGHLIGHT
      A small bright spot to give the core dimension
    -->
    <ellipse cx="42" cy="-72" rx="16" ry="10" fill="#FFFFFF" opacity="0.25" transform="rotate(-45 42 -72)"/>
    
    <!-- 
      STONE HIGHLIGHT
      Subtle edge light on the stone
    -->
    <path d="M 0,-180 A 180,180 0 0,1 127.28,-127.28" 
          fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
  </g>
  
  <!-- Labels -->
  <text x="256" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8A8A8A" letter-spacing="0.2em">CORELITH — THE CORE REVEAL</text>
  <text x="256" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">Construction Grid • 8×8 • Golden Ratio</text>
</svg>