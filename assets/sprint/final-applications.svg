<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="appCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="50%" style="stop-color:#D96BA8"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#FAF9F7"/>
  
  <!-- ===== APP ICON MOCKUP ===== -->
  <g transform="translate(80, 80)">
    <text x="0" y="-20" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="0.15em">APP ICON (iOS)</text>
    <!-- Phone -->
    <rect x="0" y="0" width="240" height="480" rx="32" fill="#1A1A1A" filter="url(#shadow)"/>
    <rect x="12" y="12" width="216" height="456" rx="24" fill="#0A0A0A"/>
    <!-- Screen -->
    <rect x="20" y="20" width="200" height="440" rx="20" fill="#FAF9F7"/>
    <!-- App icon on home screen -->
    <rect x="70" y="100" width="100" height="100" rx="22" fill="#1A1A1A"/>
    <path d="M 120,118 A 36,36 0 1,1 94.44,165.72 L 120,150 Z" fill="#1A1A1A"/>
    <path d="M 120,150 L 94.44,165.72 A 36,36 0 0,0 114.8,118.7 Z" fill="#252525"/>
    <circle cx="134.86" cy="135.14" r="11" fill="url(#appCore)"/>
    <text x="120" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1A1A1A">Corelith</text>
    <!-- Status bar -->
    <rect x="20" y="20" width="200" height="24" rx="20" fill="#FAF9F7"/>
    <text x="200" y="36" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#1A1A1A">9:41</text>
  </g>
  
  <!-- ===== WEBSITE HEADER MOCKUP ===== -->
  <g transform="translate(400, 80)">
    <text x="0" y="-20" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="0.15em">WEBSITE HEADER</text>
    <!-- Browser chrome -->
    <rect x="0" y="0" width="700" height="480" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="700" height="40" rx="12" fill="#F0EFED"/>
    <rect x="0" y="28" width="700" height="12" fill="#F0EFED"/>
    <circle cx="24" cy="20" r="6" fill="#E8E8E8"/>
    <circle cx="44" cy="20" r="6" fill="#E8E8E8"/>
    <circle cx="64" cy="20" r="6" fill="#E8E8E8"/>
    <!-- Nav -->
    <rect x="0" y="40" width="700" height="64" fill="#FFFFFF"/>
    <!-- Logo in nav -->
    <g transform="translate(32, 56)">
      <path d="M 16,2 A 14,14 0 1,1 6.1,23.9 L 16,16 Z" fill="#1A1A1A"/>
      <circle cx="20.4" cy="11.6" r="4.5" fill="url(#appCore)"/>
      <text x="38" y="22" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Corelith</text>
    </g>
    <!-- Nav links -->
    <text x="480" y="80" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8A8A8A" letter-spacing="0.08em">PRODUCT</text>
    <text x="560" y="80" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8A8A8A" letter-spacing="0.08em">PRICING</text>
    <text x="640" y="80" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8A8A8A" letter-spacing="0.08em">ABOUT</text>
    <!-- Hero area -->
    <rect x="0" y="104" width="700" height="376" fill="#FAF9F7"/>
    <text x="350" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#1A1A1A">Built in Zimbabwe</text>
    <text x="350" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#1A1A1A">for Zimbabwe businesses</text>
    <rect x="275" y="300" width="150" height="44" rx="8" fill="#1A1A1A"/>
    <text x="350" y="327" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FAF9F7">Start Free Trial</text>
  </g>
  
  <!-- ===== BUSINESS CARD MOCKUP ===== -->
  <g transform="translate(80, 640)">
    <text x="0" y="-20" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="0.15em">BUSINESS CARD</text>
    <!-- Card front -->
    <rect x="0" y="0" width="320" height="180" rx="12" fill="#1A1A1A" filter="url(#shadow)"/>
    <g transform="translate(24, 24)">
      <path d="M 20,3 A 17,17 0 1,1 8.2,27.7 L 20,20 Z" fill="#FAF9F7"/>
      <path d="M 20,20 L 8.2,27.7 A 17,17 0 0,0 17.8,3.3 Z" fill="#E8E8E8" opacity="0.2"/>
      <circle cx="26.1" cy="13.9" r="5.5" fill="url(#appCore)"/>
    </g>
    <text x="24" y="100" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#FAF9F7">Tate</text>
    <text x="24" y="124" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8A8A8A">Founder, Corelith</text>
    <text x="24" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8A8A8A">hello@pagka.dev</text>
    <text x="24" y="164" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8A8A8A">+263 78 493 9111</text>
    <text x="296" y="164" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF9F7">Corelith</text>
  </g>
  
  <!-- ===== SOCIAL MEDIA MOCKUP ===== -->
  <g transform="translate(480, 640)">
    <text x="0" y="-20" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="0.15em">SOCIAL AVATAR</text>
    <!-- Profile card -->
    <rect x="0" y="0" width="200" height="200" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="60" rx="12" fill="#1A1A1A"/>
    <rect x="0" y="48" width="200" height="12" fill="#1A1A1A"/>
    <!-- Avatar circle -->
    <circle cx="100" cy="70" r="36" fill="#FAF9F7" stroke="#FFFFFF" stroke-width="4"/>
    <g transform="translate(82, 52)">
      <path d="M 18,3 A 15,15 0 1,1 7.7,24.8 L 18,18 Z" fill="#1A1A1A"/>
      <circle cx="23.5" cy="12.5" r="5" fill="url(#appCore)"/>
    </g>
    <text x="100" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">Corelith</text>
    <text x="100" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8A8A8A">@corelithapp</text>
    <text x="100" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8A8A8A">ERP built in Zimbabwe 🇿🇼</text>
  </g>
  
  <!-- ===== LOADING ANIMATION FRAME ===== -->
  <g transform="translate(760, 640)">
    <text x="0" y="-20" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="0.15em">LOADING STATE</text>
    <rect x="0" y="0" width="200" height="200" rx="12" fill="#1A1A1A" filter="url(#shadow)"/>
    <g transform="translate(100, 100)">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="50" fill="none" stroke="#2D2D2D" stroke-width="4"/>
      <!-- Animated arc (static frame) -->
      <path d="M 0,-50 A 50,50 0 0,1 35.35,-35.35" fill="none" stroke="url(#appCore)" stroke-width="4" stroke-linecap="round"/>
      <!-- Core pulse -->
      <circle cx="0" cy="0" r="16" fill="url(#appCore)" opacity="0.8"/>
      <circle cx="0" cy="0" r="24" fill="url(#appCore)" opacity="0.2"/>
    </g>
    <text x="100" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#8A8A8A">Loading...</text>
  </g>
</svg>
