<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 7: The Zimbabwe Sun -->
  <!-- Abstract sun/stone — warm, African geometry without clichés -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Center sun/core -->
    <circle cx="0" cy="0" r="35" fill="url(#sunGrad)"/>
    <!-- Radiating geometric rays — not organic, precise -->
    <rect x="-6" y="-75" width="12" height="30" rx="6" fill="#1A1A1A"/>
    <rect x="-6" y="45" width="12" height="30" rx="6" fill="#1A1A1A"/>
    <rect x="-75" y="-6" width="30" height="12" rx="6" fill="#1A1A1A"/>
    <rect x="45" y="-6" width="30" height="12" rx="6" fill="#1A1A1A"/>
    <!-- Diagonal rays -->
    <rect x="42" y="-54" width="12" height="28" rx="6" fill="#1A1A1A" transform="rotate(45 48 -40)"/>
    <rect x="-54" y="42" width="12" height="28" rx="6" fill="#1A1A1A" transform="rotate(45 -48 56)"/>
    <rect x="42" y="26" width="12" height="28" rx="6" fill="#1A1A1A" transform="rotate(-45 48 40)"/>
    <rect x="-54" y="-54" width="12" height="28" rx="6" fill="#1A1A1A" transform="rotate(-45 -48 -40)"/>
  </g>
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 7: ZIMBABWE SUN</text>
</svg>
