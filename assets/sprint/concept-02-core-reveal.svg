<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 2: The Core Reveal -->
  <!-- A circle with a diagonal cut revealing the inner core -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Outer stone shell -->
    <circle cx="0" cy="0" r="70" fill="#1A1A1A"/>
    <!-- The cut / reveal -->
    <path d="M 0,-70 A 70,70 0 0,1 49.5,-49.5 L 0,0 Z" fill="#2D2D2D"/>
    <!-- The glowing core revealed -->
    <circle cx="25" cy="-25" r="28" fill="url(#coreGrad)"/>
  </g>
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 2: CORE REVEAL</text>
</svg>
