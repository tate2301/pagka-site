<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 5: The Shield Stone -->
  <!-- Protective, solid, approachable — a stone that guards -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Shield outline — rounded at top, pointed at bottom -->
    <path d="M 0,-75 C 40,-75 70,-45 70,0 C 70,50 0,80 0,80 C 0,80 -70,50 -70,0 C -70,-45 -40,-75 0,-75Z" fill="#1A1A1A"/>
    <!-- Inner core — smaller shield -->
    <path d="M 0,-40 C 22,-40 38,-22 38,0 C 38,28 0,48 0,48 C 0,48 -38,28 -38,0 C -38,-22 -22,-40 0,-40Z" fill="url(#shieldGrad)"/>
    <!-- Highlight -->
    <path d="M 0,-75 C 25,-75 45,-60 55,-40" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.1"/>
  </g>
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 5: SHIELD STONE</text>
</svg>
