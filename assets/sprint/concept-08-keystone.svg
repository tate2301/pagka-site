<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Concept 8: The Keystone -->
  <!-- The central stone that holds everything — the most important piece -->
  <rect width="200" height="200" fill="#FAF9F7"/>
  <g transform="translate(100,100)">
    <!-- Outer arch stones -->
    <rect x="-65" y="-20" width="30" height="50" rx="4" fill="#2D2D2D"/>
    <rect x="35" y="-20" width="30" height="50" rx="4" fill="#2D2D2D"/>
    <rect x="-65" y="-60" width="30" height="30" rx="4" fill="#333333"/>
    <rect x="35" y="-60" width="30" height="30" rx="4" fill="#333333"/>
    <!-- The keystone — trapezoid shape, wider at top -->
    <polygon points="-25,-70 25,-70 18,20 -18,20" fill="#1A1A1A"/>
    <!-- Inner core of the keystone -->
    <polygon points="-12,-55 12,-55 8,0 -8,0" fill="url(#keyGrad)"/>
    <!-- Glow effect -->
    <polygon points="-18,-60 18,-60 14,-5 -14,-5" fill="url(#keyGrad)" opacity="0.25"/>
  </g>
  <defs>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F27B6A"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
  </defs>
  <text x="100" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="0.1em">CONCEPT 8: THE KEYSTONE</text>
</svg>
